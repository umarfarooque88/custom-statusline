<title>custom-statusline — pick a status line</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --void:#0e0f12; --panel:#16181d; --panel2:#1b1e24; --rule:#24272e;
    --ink:#e6e8ec; --dim:#9aa1ab; --mut:#6b727c; --faint:#3a3f47;
    --accent:#e2896a;                 /* replaced live by the focused design's hue */
    --mono:ui-monospace,"Cascadia Code","SF Mono",Menlo,Consolas,monospace;
    --sans:ui-sans-serif,-apple-system,"Segoe UI",Roboto,sans-serif;
    --bar-h:46px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{ background:var(--void); color:var(--ink); font-family:var(--sans);
    line-height:1.5; padding-bottom:var(--bar-h);
    background-image:radial-gradient(1200px 600px at 85% -10%, rgba(226,137,106,.05), transparent 60%);
  }

  /* ---- masthead --------------------------------------------------------- */
  header{ border-bottom:1px solid var(--rule); padding:20px clamp(16px,4vw,40px) 18px;
    display:flex; align-items:flex-end; gap:22px 28px; flex-wrap:wrap; }
  .brand{ display:flex; flex-direction:column; gap:7px; min-width:0; }
  .eyebrow{ font-family:var(--mono); font-size:11px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--mut); margin:0; }
  h1{ font-family:var(--mono); font-size:clamp(19px,2.4vw,26px); font-weight:600; letter-spacing:-.01em; margin:0; }
  h1 b{ color:var(--accent); font-weight:600; transition:color .35s ease; }
  .lede{ color:var(--dim); font-size:13.5px; max-width:56ch; margin:0; }
  .lede code{ font-family:var(--mono); font-size:12px; color:var(--ink);
    background:var(--panel2); border:1px solid var(--rule); padding:1px 6px; border-radius:6px; }

  /* ---- app two-pane ----------------------------------------------------- */
  .app{ display:grid; grid-template-columns:minmax(260px,354px) 1fr; align-items:start; }
  @media (max-width:860px){ .app{ grid-template-columns:1fr; } }

  .rail{ position:sticky; top:0; align-self:start; border-right:1px solid var(--rule);
    max-height:calc(100vh - var(--bar-h)); display:flex; flex-direction:column; }
  @media (max-width:860px){ .rail{ position:static; border-right:0; border-bottom:1px solid var(--rule); max-height:none; } }
  .filters{ padding:14px clamp(12px,2vw,16px) 12px; border-bottom:1px solid var(--rule);
    display:flex; flex-direction:column; gap:10px; }
  .segrow{ display:flex; flex-wrap:wrap; gap:6px; }
  .seg{ font-family:var(--mono); font-size:11.5px; color:var(--dim); background:transparent;
    border:1px solid var(--rule); border-radius:999px; padding:5px 11px; cursor:pointer; transition:.15s ease; }
  .seg:hover{ color:var(--ink); border-color:var(--faint); }
  .seg[aria-pressed="true"]{ color:var(--void); background:var(--accent); border-color:var(--accent); font-weight:600; }
  .fonttoggle{ display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:11.5px;
    color:var(--dim); cursor:pointer; user-select:none; }
  .fonttoggle input{ accent-color:var(--accent); width:14px; height:14px; }

  .list{ overflow-y:auto; padding:6px; scrollbar-width:thin; scrollbar-color:var(--faint) transparent; }
  .list::-webkit-scrollbar{ width:9px; }
  .list::-webkit-scrollbar-thumb{ background:var(--faint); border-radius:9px; border:2px solid var(--void); }
  .grp{ font-family:var(--mono); font-size:10px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--mut); padding:14px 10px 6px; }
  .row{ display:grid; grid-template-columns:30px 1fr auto; align-items:center; gap:10px;
    width:100%; text-align:left; background:transparent; border:1px solid transparent; border-radius:9px;
    padding:8px 10px; cursor:pointer; color:inherit; font:inherit; }
  .row:hover{ background:var(--panel); }
  .row[aria-selected="true"]{ background:var(--panel2); border-color:var(--faint); }
  .row[aria-selected="true"] .rnum{ color:var(--accent); }
  .rnum{ font-family:var(--mono); font-size:16px; font-weight:600; color:var(--mut);
    font-variant-numeric:tabular-nums; text-align:right; transition:color .2s; }
  .rmid{ min-width:0; }
  .rname{ font-size:13.5px; font-weight:550; letter-spacing:-.01em; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; }
  .rmini{ margin-top:3px; height:1.2em; overflow:hidden;
    -webkit-mask-image:linear-gradient(90deg,#000 72%,transparent); mask-image:linear-gradient(90deg,#000 72%,transparent); opacity:.85; }
  .rbadge{ font-family:var(--mono); font-size:9px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--mut); border:1px solid var(--rule); border-radius:5px; padding:3px 5px; white-space:nowrap; }
  .rbadge.safe{ color:#7fae6b; border-color:#33502a; }
  .rbadge.font{ color:#c79154; border-color:#4d3a1f; }

  /* ---- stage ------------------------------------------------------------ */
  .stage{ position:sticky; top:0; padding:clamp(16px,3vw,34px) clamp(16px,4vw,44px);
    min-height:calc(100vh - var(--bar-h)); display:flex; flex-direction:column; gap:20px; }
  @media (max-width:860px){ .stage{ order:-1; min-height:0; z-index:5; background:var(--void); border-bottom:1px solid var(--rule); } }
  .stagehd{ display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
  .stagenum{ font-family:var(--mono); font-size:clamp(40px,7vw,64px); font-weight:600; line-height:.9;
    color:var(--accent); font-variant-numeric:tabular-nums; transition:color .35s ease; }
  .stagemeta{ display:flex; flex-direction:column; gap:4px; }
  .stagename{ font-family:var(--mono); font-size:clamp(18px,2.4vw,23px); font-weight:600; letter-spacing:-.01em; }
  .stagetag{ font-family:var(--mono); font-size:11px; letter-spacing:.05em; text-transform:uppercase; color:var(--mut); }
  .pitch{ color:var(--dim); font-size:14px; max-width:64ch; margin:0; }
  .pitch b{ color:var(--ink); font-weight:600; }

  .term{ border:1px solid var(--rule); border-radius:12px; overflow:hidden;
    background:linear-gradient(180deg,#101216,#0c0d10); box-shadow:0 20px 50px rgba(0,0,0,.45); }
  .termbar{ display:flex; align-items:center; gap:7px; padding:9px 13px; border-bottom:1px solid var(--rule); background:#0f1115; }
  .dot{ width:11px; height:11px; border-radius:50%; }
  .termttl{ margin-left:8px; font-family:var(--mono); font-size:11px; color:var(--mut); }
  .termbody{ padding:14px 15px 4px; font-family:var(--mono); font-size:12.5px; overflow-x:auto; }
  .cmdline .p{ color:#6fae8f; } .cmdline .c{ color:var(--dim); }
  .out{ color:#454b54; margin:2px 0 0; }
  .slrow{ display:flex; align-items:center; gap:12px; padding:12px 0 14px; }
  .sltag{ font-family:var(--mono); font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--mut); flex:0 0 66px; }
  .sltag.hot{ color:#b06a52; }

  /* rendered status-line previews (from engine ANSI via ansi2html) */
  .sl{ font-family:var(--mono); font-size:13px; white-space:pre; }
  .sl.sm{ font-size:11px; }
  .sl .r{ display:inline-block; height:1.6em; line-height:1.6em; white-space:pre; vertical-align:top; }
  .sl .g{ display:inline-block; width:.6em; height:1.6em; vertical-align:top; }
  .sl .g.br{ padding:.15em .05em; }
  .sl .g i{ display:block; width:100%; height:100%; }

  .pick{ display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-top:2px; }
  .replybtn{ font-family:var(--mono); font-size:13px; font-weight:600; color:var(--void);
    background:var(--accent); border:0; border-radius:9px; padding:10px 16px; cursor:pointer; transition:filter .15s, background .35s ease; }
  .replybtn:hover{ filter:brightness(1.08); }
  .pickhint{ font-size:12.5px; color:var(--mut); }
  .pickhint code{ font-family:var(--mono); color:var(--dim); }

  /* ---- signature: pinned live status bar -------------------------------- */
  .livebar{ position:fixed; left:0; right:0; bottom:0; height:var(--bar-h); z-index:40;
    border-top:1px solid var(--rule); background:#0b0c0f; display:flex; align-items:center; gap:14px; padding:0 clamp(14px,3vw,28px); }
  .livelabel{ font-family:var(--mono); font-size:9.5px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--mut); flex:0 0 auto; display:flex; align-items:center; gap:7px; }
  .pulse{ width:7px; height:7px; border-radius:50%; background:var(--accent); transition:background .35s ease; }
  @media (prefers-reduced-motion:no-preference){ .pulse{ animation:pulse 2.4s ease-in-out infinite; } }
  @keyframes pulse{ 0%,100%{ opacity:.35; } 50%{ opacity:1; } }
  .livewrap{ position:relative; flex:1; min-width:0; overflow-x:auto; height:100%; display:flex; align-items:center; scrollbar-width:none; }
  .livewrap::-webkit-scrollbar{ display:none; }
  .livelayer{ position:absolute; left:0; top:50%; transform:translateY(-50%); transition:opacity .8s ease; }
  .livewrap.showhot .lv-calm{ opacity:0; } .livewrap.showhot .lv-hot{ opacity:1; }
  .lv-hot{ opacity:0; }

  .hud{ position:fixed; right:16px; bottom:calc(var(--bar-h) + 16px); z-index:41;
    font-family:var(--mono); font-size:13px; color:var(--ink); background:var(--panel2);
    border:1px solid var(--faint); border-radius:9px; padding:8px 12px; opacity:0; transform:translateY(6px);
    transition:.15s ease; pointer-events:none; }
  .hud.on{ opacity:1; transform:none; }
  .hud b{ color:var(--accent); }
  .toast{ position:fixed; left:50%; bottom:calc(var(--bar-h) + 18px); transform:translate(-50%,8px);
    z-index:41; font-family:var(--mono); font-size:12.5px; color:var(--void); background:var(--accent);
    padding:8px 14px; border-radius:8px; opacity:0; transition:.2s ease; pointer-events:none; }
  .toast.on{ opacity:1; transform:translate(-50%,0); }

  :focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
</style>

<header>
  <div class="brand">
    <p class="eyebrow">Claude Code · statusLine</p>
    <h1>Pick a status line <b>·</b> 27 designs</h1>
  </div>
  <p class="lede">Every preview is the <b style="color:var(--ink);font-weight:600">real engine output</b>, not a mockup. Pilot the list with your keyboard — arrows, or just type a number. Reply with that number in Claude Code, or run <code>/custom-statusline</code> to change anytime.</p>
</header>

<div class="app">
  <aside class="rail">
    <div class="filters">
      <div class="segrow" id="groups"></div>
      <label class="fonttoggle"><input type="checkbox" id="safeonly"> font-safe only <span id="safecount" style="color:var(--mut)"></span></label>
    </div>
    <div class="list" id="list" role="listbox" aria-label="Status line designs" tabindex="0"></div>
  </aside>

  <main class="stage" id="stage" aria-live="polite"></main>
</div>

<div class="livebar">
  <span class="livelabel"><span class="pulse"></span> live</span>
  <div class="livewrap" id="livewrap">
    <span class="livelayer lv-calm sl" id="lvCalm"></span>
    <span class="livelayer lv-hot sl" id="lvHot"></span>
  </div>
</div>

<div class="hud" id="hud"></div>
<div class="toast" id="toast"></div>

<script>
const CARDS=[
  { group:'Everyday', name:'Kiln Flow', badge:['powerline','font'],

  { group:'Everyday', name:'Gauge', badge:['font-safe','safe'],

  { group:'Everyday', name:'Blocks', badge:['font-safe','safe'],

  { group:'Expressive', name:'Claymorphic', badge:['round caps','font'],

  { group:'Expressive', name:'Arcade HUD', badge:['emoji','font'],

  { group:'Expressive', name:'Gradient Sweep', badge:['font-safe','safe'],

  { group:'Expressive', name:'Phosphor LCD', badge:['font-safe','safe'],

  { group:'Style studies', name:'Bauhaus', badge:['font-safe','safe'],

  { group:'Style studies', name:'Swiss', badge:['font-safe','safe'],
    pitch:'Grid discipline, objective typography, and exactly <b>one red accent</b> — the period after the model name, plus any meter past 80%. Warming meters go <b>bold, not colored</b>, and digits are padded so the columns never move. The most restrained of all twenty-seven.' },
  { group:'Style studies', name:'Wabi-sabi', badge:['font-safe','safe'],
    pitch:'Moss, stone, and mist — <b>meters are moon phases</b>: ○ empty, ◔ waxing, ◐ half, ● full(rust). No percent signs anywhere; you glance at the moons like a calendar. The gentlest possible warning system.' },
  { group:'Style studies', name:'Glassmorphic', badge:['round caps','font'],
    pitch:'Frosted panes floating over the dark, icy mint→rose meters. Real blur doesn\'t exist in a terminal — the panes are <b>soft-tinted rounded capsules</b> instead, which keeps the airy layered feel.' },
  { group:'Style studies', name:'Memphis', badge:['font-safe','safe'],

  { group:'Style studies', name:'Art Deco', badge:['font-safe','safe'],
    pitch:'Champagne gold on charcoal with <b>fan ornaments ❯❯ ❮❮ framing the model</b> and long dash rules between facts. Uppercase smallwork, emerald→gold→ruby meters. Gatsby doing DevOps.' },
  { group:'Style studies', name:'Nord', badge:['font-safe','safe'],
    pitch:'The beloved arctic palette: frost cyan, snow, glacier blues. <b>Minimal punctuation, just breathing room</b> — the quietest colored option. Meters use Nord\'s own aurora green/yellow/red.' },
  { group:'Style studies', name:'Dracula', badge:['font-safe','safe'],
    pitch:'The classic editor theme\'s exact palette on its own #282A36 canvas — purple identity, pink branch, comment-blue labels, <b>:: separators</b> straight out of the syntax highlighting. Critical meters go bold as well as red. If your editor already runs Dracula, the status line joins the family seamlessly.' },
  { group:'Style studies', name:'Terminal Rain', badge:['font-safe','safe'],
    pitch:'Matrix greens where <b>brightness is hierarchy</b> — the model glows brightest, labels sink into dark moss. Meters break the monochrome only to warn: acid-yellow, then hot orange. ⋮ separators like falling code.' },
  { group:'Game art styles', name:'Flat', badge:['blocks','safe'],
    pitch:'<b>Monument Valley</b>: soft pastel geometry — rose, sand, lavender, teal — laid flat with no outlines, no gradients, no noise. Every meter is its own tile that <b>shifts teal → peach → dusty rose</b>; serene even when warning, never a scream.' },
  { group:'Game art styles', name:'Vector', badge:['stroke caps','font'],
    pitch:'Zero fills, all stroke — <b>vector arcade linework</b> floating on the dark. Every stat rides between bold angle caps ❬ ❭ drawn in its own state color: cyan calm → yellow warm → magenta critical. No backgrounds anywhere — the stroke color is the whole signal.' },
  { group:'Game art styles', name:'Geometric Art', badge:['font-safe','safe'],
    pitch:'<b>Geometry Wars</b>: neon particles for a dark terminal. Every meter flies its own geometric glyph — ◇ △ ▽ — shifting lime → orange → magenta and <b>filling solid</b> ◆ ▲ ▼ as pressure builds, bold at critical. Faint grid-blue ┆ separators hold the lanes.' },
  { group:'Game art styles', name:'Pixel', badge:['font-safe','safe'],
    pitch:'<b>Stardew Valley</b>: chunky ▓▒░ pixel bars in the farm palette — leaf green filling to wheat gold to berry red, cost as ⛁ coin. The wood-brown model tag reads like a crafting-menu label.' },
  { group:'Game art styles', name:'Cartoon', badge:['round caps','font'],
    pitch:'<b>Team Fortress 2</b>: RED vs BLU team colors on parchment cream, thick rounded chips. The context gauge <b>joins Mann-Co orange at 50%</b>, and when it runs critical it <b>switches teams to RED and gains a shout</b> — ctx 88% !' },
  { group:'Game art styles', name:'Cel Shading', badge:['blocks','safe'],
    pitch:'<b>Wind Waker</b>: bright flat sea-and-grass panels divided by <b>dark ink seams</b> — the hand-drawn outline stroke that defines cel shading, one column wide between every panel and capping both ends. Sail-red model, ocean directory, and meters that shade grass and sand → sunset → sail-red as the pressure climbs.' },
  { group:'Game art styles', name:'Monochromatic', badge:['font-safe','safe'],

// derive each design's signal hue from the most-saturated color in its hot preview
function accentOf(n){
  const html=(PREVIEWS[n]&&PREVIEWS[n].hot)||'';
  const cols=[...html.matchAll(/rgb\((\d+),(\d+),(\d+)\)/g)].map(m=>[+m[1],+m[2],+m[3]]);
  let best=null, bestS=-1;
  for(const [r,g,b] of cols){
    const mx=Math.max(r,g,b), mn=Math.min(r,g,b);
    const sat=mx===0?0:(mx-mn)/mx, lum=mx/255;
    if(lum<.3||lum>.98) continue;
    const score=sat*Math.min(1,lum*1.4);
    if(score>bestS){ bestS=score; best=[r,g,b]; }
  }
  return best?`rgb(${best[0]},${best[1]},${best[2]})`:'#e2896a';
}

const GROUPS=['All','Everyday','Expressive','Style studies','Game art styles'];
const state={ group:'All', safeOnly:false, sel:0, buf:'', bufTimer:null };

const $=s=>document.querySelector(s);
const list=$('#list'), stage=$('#stage'), hud=$('#hud'), toast=$('#toast');
const lvCalm=$('#lvCalm'), lvHot=$('#lvHot'), livewrap=$('#livewrap');

function matches(i){
  const d=CARDS[i];
  if(state.group!=='All' && d.group!==state.group) return false;
  if(state.safeOnly && d.badge[1]!=='safe') return false;
  return true;
}
function visibleIdx(){ return CARDS.map((_,i)=>i).filter(matches); }

function buildFilters(){
  const g=$('#groups');
  g.innerHTML=GROUPS.map(x=>`<button class="seg" data-g="${x}" aria-pressed="${x===state.group}">${x==='Style studies'?'Style':x==='Game art styles'?'Game art':x}</button>`).join('');
  g.querySelectorAll('.seg').forEach(b=>b.onclick=()=>{ state.group=b.dataset.g; syncFilters(); renderList(); ensureVisibleSelection(); });
  const safe=CARDS.filter(d=>d.badge[1]==='safe').length;
  $('#safecount').textContent='('+safe+')';
  $('#safeonly').onchange=e=>{ state.safeOnly=e.target.checked; renderList(); ensureVisibleSelection(); };
}
function syncFilters(){ document.querySelectorAll('#groups .seg').forEach(b=>b.setAttribute('aria-pressed', b.dataset.g===state.group)); }

function renderList(){
  const vis=visibleIdx();
  let html='', lastGroup=null;
  for(const i of vis){
    const d=CARDS[i];
    if(d.group!==lastGroup && state.group==='All'){ html+=`<div class="grp">${d.group}</div>`; lastGroup=d.group; }
    const mini=(PREVIEWS[i+1]&&PREVIEWS[i+1].calm)||'';
    html+=`<button class="row" role="option" data-i="${i}" aria-selected="${i===state.sel}">
      <span class="rnum">${i+1}</span>
      <span class="rmid"><span class="rname">${d.name}</span><span class="rmini sl sm">${mini}</span></span>
      <span class="rbadge ${d.badge[1]}">${d.badge[0]}</span>
    </button>`;
  }
  list.innerHTML=html||`<div class="grp">no designs match</div>`;
  list.querySelectorAll('.row').forEach(r=>{ r.onclick=()=>select(+r.dataset.i); });
}

function select(i, opts){
  opts=opts||{};
  state.sel=i; const d=CARDS[i], pv=PREVIEWS[i+1]||{calm:'',hot:''};
  document.documentElement.style.setProperty('--accent', accentOf(i+1));

  stage.innerHTML=`
    <div class="stagehd">
      <span class="stagenum">${String(i+1).padStart(2,'0')}</span>
      <span class="stagemeta">
        <span class="stagename">${d.name}</span>
        <span class="stagetag">${d.group} · ${d.badge[0]}</span>
      </span>
    </div>
    <p class="pitch">${d.pitch}</p>
    <div class="term">
      <div class="termbar">
        <span class="dot" style="background:#ff5f56"></span><span class="dot" style="background:#ffbd2e"></span><span class="dot" style="background:#27c93f"></span>
        <span class="termttl">~/my-project — Claude Code</span>
      </div>
      <div class="termbody">
        <div class="cmdline"><span class="p">›</span> <span class="c">claude</span></div>
        <p class="out">· · · working · · ·</p>
        <div class="slrow"><span class="sltag">calm</span><span class="sl">${pv.calm}</span></div>
        <div class="slrow"><span class="sltag hot">high use</span><span class="sl">${pv.hot}</span></div>
      </div>
    </div>
    <div class="pick">
      <button class="replybtn" id="reply">reply <b style="font-weight:800">${i+1}</b> in Claude Code</button>
      <span class="pickhint">or later, <code>/custom-statusline → ${i+1}</code></span>
    </div>`;
  $('#reply').onclick=()=>copyNumber(i+1);

  lvCalm.innerHTML=pv.calm; lvHot.innerHTML=pv.hot;

  list.querySelectorAll('.row').forEach(r=>r.setAttribute('aria-selected', +r.dataset.i===i));
  if(!opts.noScroll){
    const row=list.querySelector(`.row[data-i="${i}"]`);
    if(row) row.scrollIntoView({block:'nearest'});
  }
}
function ensureVisibleSelection(){
  const vis=visibleIdx();
  if(!vis.includes(state.sel) && vis.length) select(vis[0]);
}

if(matchMedia('(prefers-reduced-motion: no-preference)').matches){
  let hot=false;
  setInterval(()=>{ hot=!hot; livewrap.classList.toggle('showhot', hot); }, 3200);
} else {
  livewrap.classList.add('showhot');
}

function copyNumber(n){
  const show=()=>{ toast.textContent='copied "'+n+'" — paste it in Claude Code'; toast.classList.add('on'); setTimeout(()=>toast.classList.remove('on'),1900); };
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(String(n)).then(show).catch(show); }
  else show();
}

function move(delta){
  const vis=visibleIdx(); if(!vis.length) return;
  let p=vis.indexOf(state.sel); if(p<0) p=0;
  p=Math.max(0,Math.min(vis.length-1,p+delta));
  select(vis[p]);
}
window.addEventListener('keydown',e=>{
  if(e.target.matches('input')) return;
  if(e.key==='ArrowDown'||e.key==='j'){ e.preventDefault(); move(1); }
  else if(e.key==='ArrowUp'||e.key==='k'){ e.preventDefault(); move(-1); }
  else if(e.key==='Enter'){ e.preventDefault(); copyNumber(state.sel+1); }
  else if(/^[0-9]$/.test(e.key)){
    state.buf=(state.buf+e.key).slice(-2);
    let n=parseInt(state.buf,10);
    if(n>27){ state.buf=e.key; n=parseInt(state.buf,10); }
    hud.innerHTML='go to <b>'+state.buf+'</b>'; hud.classList.add('on');
    clearTimeout(state.bufTimer);
    state.bufTimer=setTimeout(()=>{ hud.classList.remove('on'); state.buf=''; }, 900);
    if(n>=1&&n<=27) select(n-1);
  }
});

buildFilters(); renderList(); select(0);
</script>
